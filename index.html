<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Loan Strategy Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #f8f9fa; color: #1a1a1a; }
    #root { max-width: 760px; margin: 0 auto; padding: 16px; }

    /* Custom slider — no appearance reset, just accent color */
    input[type="range"] {
      accent-color: #378ADD;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
const { useState, useMemo } = React;

const FPL150_1 = 23475; // 150% FPL, 1 person
const FPL150_2 = 31875; // 150% FPL, 2 people

function calcIBR(agi, fpl150) { return Math.max(0, Math.round((agi - fpl150) * 0.10 / 12)); }

function calcRAP(agi) {
  if (agi <= 10000) return 10;
  const b = [[20000,.01],[30000,.02],[40000,.03],[50000,.04],[60000,.05],[70000,.06],[80000,.07],[90000,.08],[100000,.09],[Infinity,.10]];
  return Math.max(10, Math.round(agi * b.find(([c]) => agi <= c)[1] / 12));
}

function tax(agi, married) {
  const br = married
    ? [[23200,.10],[94300,.12],[201050,.22],[383900,.24],[487450,.32],[731200,.35],[Infinity,.37]]
    : [[11600,.10],[47150,.12],[100525,.22],[191950,.24],[243725,.32],[609350,.35],[Infinity,.37]];
  const stdDed = married ? 30000 : 15000;
  let t = 0, p = 0; const tx = Math.max(0, agi - stdDed);
  for (const [c, r] of br) { const ch = Math.min(tx, c) - p; if (ch <= 0) break; t += ch * r; p = c; }
  return Math.round(t);
}

function refiCalc(bal, rate, yrs) {
  if (bal <= 0) return { mo: 0, total: 0 };
  const r = rate/100/12, n = yrs*12, mo = Math.round(bal * r / (1 - Math.pow(1+r, -n)));
  return { mo, total: mo * n };
}

function runStrategy({ startBal, avgRate, priorAGI, resSalaries, attendSalary, plan, isPSLF, refiRate, refiYears, married, spouseIncRes, spouseIncAtt }) {
  const r = avgRate / 100;
  const fpl150 = married ? FPL150_2 : FPL150_1;
  let bal = startBal, totalPaid = 0;
  const resYears = resSalaries.length;
  const totalYears = isPSLF ? 10 : resYears;
  const timeline = [];

  const payAGIs = [];
  for (let y = 0; y < totalYears; y++) {
    let baseAGI;
    const isResYear = y < resYears;
    const spouseInc = isResYear ? spouseIncRes : spouseIncAtt;
    if (y === 0) baseAGI = priorAGI;
    else if (y <= resYears) baseAGI = resSalaries[Math.min(y-1, resYears-1)];
    else if (y === resYears) baseAGI = resSalaries[resYears - 1];
    else baseAGI = attendSalary * Math.pow(1.03, y - resYears - 1);
    payAGIs.push(married ? baseAGI + spouseInc : baseAGI);
  }

  for (let y = 0; y < totalYears; y++) {
    const isRes = y < resYears;
    const payAGI = payAGIs[y];
    const spouseInc = isRes ? spouseIncRes : spouseIncAtt;
    const yourIncome = isRes ? resSalaries[y] : attendSalary * Math.pow(1.03, y - resYears);
    const householdIncome = married ? yourIncome + spouseInc : yourIncome;
    const monthly = plan === "ibr" ? calcIBR(payAGI, fpl150) : calcRAP(payAGI);
    const annualPay = monthly * 12;
    const interest = bal * r;

    if (plan === "rap") {
      const princFromPay = Math.max(0, annualPay - interest);
      let reduction = princFromPay < 600 ? Math.min(600, princFromPay + 600) : princFromPay;
      bal = Math.max(0, bal - reduction);
    } else {
      bal = Math.max(0, bal + interest - annualPay);
    }
    totalPaid += annualPay;
    const t = tax(householdIncome, married);
    timeline.push({
      year: y+1, isRes, payAGI: Math.round(payAGI), actualIncome: Math.round(householdIncome),
      monthly, annualPay: Math.round(annualPay), interest: Math.round(interest),
      balance: Math.round(bal), totalPaid: Math.round(totalPaid),
      afterTaxAndLoans: Math.round(householdIncome - t - annualPay),
    });
  }

  let refiMo = 0, refiTotal = 0, balAtRefi = 0;
  if (!isPSLF) {
    balAtRefi = Math.round(bal);
    const rf = refiCalc(bal, refiRate, refiYears);
    refiMo = rf.mo; refiTotal = rf.total;
  }

  const totalLoanCost = isPSLF ? Math.round(totalPaid) : Math.round(totalPaid + refiTotal);
  const forgiven = isPSLF ? Math.round(bal) : 0;

  let tenYrNet = 0;
  for (let y = 0; y < 10; y++) {
    const isRes = y < resYears;
    const spouseInc = isRes ? spouseIncRes : spouseIncAtt;
    const yourGross = isRes ? resSalaries[y] : attendSalary * Math.pow(1.03, y - resYears);
    const householdGross = married ? yourGross + spouseInc : yourGross;
    const t = tax(householdGross, married);
    let loanPay;
    if (y < totalYears) loanPay = timeline[y]?.annualPay || 0;
    else if (!isPSLF && y < resYears + refiYears) loanPay = refiMo * 12;
    else loanPay = 0;
    tenYrNet += householdGross - t - loanPay;
  }

  return {
    timeline, totalPaid: Math.round(totalPaid), totalLoanCost, forgiven,
    balAtRefi, refiMo, refiTotal, tenYrNet: Math.round(tenYrNet),
    resTotal: timeline.filter(t => t.isRes).reduce((s, t) => s + t.annualPay, 0),
  };
}

const fmt = n => "$" + Math.abs(Math.round(n)).toLocaleString();
const fmtK = n => "$" + Math.round(n/1000).toLocaleString() + "K";

const Badge = ({ bg, color, children }) => (
  <span style={{ display: "inline-block", fontSize: 9, padding: "2px 7px", borderRadius: 5, fontWeight: 600, background: bg, color, marginLeft: 5, verticalAlign: "middle" }}>{children}</span>
);

function App() {
  const [startBal, setStartBal] = useState(622000);
  const [avgRate, setAvgRate] = useState(7.2);
  const [pgy1, setPgy1] = useState(71000);
  const [sideInc, setSideInc] = useState(20000);
  const [priorAGI, setPriorAGI] = useState(20000);
  const [resYears, setResYears] = useState(4);
  const [pslfSal, setPslfSal] = useState(350000);
  const [privSal, setPrivSal] = useState(550000);
  const [refiRate, setRefiRate] = useState(4.5);
  const [refiYears, setRefiYears] = useState(5);
  const [married, setMarried] = useState(false);
  const [spouseIncRes, setSpouseIncRes] = useState(50000);
  const [spouseIncAtt, setSpouseIncAtt] = useState(0);
  const [expanded, setExpanded] = useState(null);

  const resSalaries = Array.from({length: resYears}, (_, i) => pgy1 + i * 2000 + sideInc);
  const base = { startBal, avgRate, priorAGI, resSalaries, refiRate, refiYears, married, spouseIncRes: married ? spouseIncRes : 0, spouseIncAtt: married ? spouseIncAtt : 0 };

  const strategies = useMemo(() => {
    const s1 = runStrategy({ ...base, attendSalary: pslfSal, plan: "ibr", isPSLF: true });
    const s2 = runStrategy({ ...base, attendSalary: pslfSal, plan: "rap", isPSLF: true });
    const s3 = runStrategy({ ...base, attendSalary: privSal, plan: "ibr", isPSLF: false });
    const s4 = runStrategy({ ...base, attendSalary: privSal, plan: "rap", isPSLF: false });
    return [
      { id: "pslf-ibr", name: "PSLF + IBR", path: "Academic", plan: "IBR", color: "#166534", bg: "#F0FDF4", border: "#22c55e", badgeBg: "#DCFCE7", ...s1 },
      { id: "pslf-rap", name: "PSLF + RAP", path: "Academic", plan: "RAP", color: "#0F6E56", bg: "#ECFDF5", border: "#34d399", badgeBg: "#D1FAE5", ...s2 },
      { id: "pp-ibr", name: "Private + IBR", path: "Private", plan: "IBR", color: "#854F0B", bg: "#FFFBEB", border: "#fbbf24", badgeBg: "#FEF3C7", ...s3 },
      { id: "pp-rap", name: "Private + RAP", path: "Private", plan: "RAP", color: "#92400e", bg: "#FFF7ED", border: "#f59e0b", badgeBg: "#FFEDD5", ...s4 },
    ];
  }, [startBal, avgRate, priorAGI, JSON.stringify(resSalaries), pslfSal, privSal, refiRate, refiYears, married, spouseIncRes, spouseIncAtt]);

  const ranked = [...strategies].sort((a, b) => b.tenYrNet - a.tenYrNet);
  ranked.forEach((s, i) => { s.rank = i + 1; });
  const byLoanCost = [...strategies].sort((a, b) => a.totalLoanCost - b.totalLoanCost);
  byLoanCost.forEach((s, i) => { s.loanRank = i + 1; });

  const medalColors = ["#FFD700", "#C0C0C0", "#CD7F32", "#888"];
  const medalLabels = ["1st", "2nd", "3rd", "4th"];

  const Slider = ({ label, min, max, step, value, onChange, format }) => {
    const pct = ((value - min) / (max - min)) * 100;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        <span style={{ fontSize: 11, color: "#888", minWidth: 115 }}>{label}</span>
        <input type="range" min={min} max={max} step={step} defaultValue={value}
          onInput={e => onChange(+e.target.value)}
          key={label}
          style={{ flex: 1 }} />
        <span style={{ fontSize: 13, fontWeight: 600, minWidth: 80, textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{format ? format(value) : fmt(value)}</span>
      </div>
    );
  };

  const best = ranked[0];

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", maxWidth: 720, margin: "0 auto", padding: "0.5rem 0" }}>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 16, fontWeight: 700 }}>Student Loan Strategy Simulator</div>
        <div style={{ fontSize: 12, color: "#888" }}>PSLF+IBR vs PSLF+RAP vs Private+IBR&#8594;Refi vs Private+RAP&#8594;Refi</div>
      </div>

      {/* Sliders */}
      <div style={{ background: "#fff", borderRadius: 12, padding: "12px 16px", marginBottom: 16, border: "1px solid #e5e5e5", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: "#888", marginBottom: 8 }}>Your situation</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: "#888", minWidth: 115 }}>Filing status</span>
          <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1px solid #e0e0e0" }}>
            {[false, true].map(v => (
              <button key={String(v)} onClick={() => { setMarried(v); if (!v) setSpouseIncome(0); }}
                style={{
                  padding: "4px 16px", fontSize: 12, fontWeight: 600, border: "none", cursor: "pointer",
                  background: married === v ? "#378ADD" : "#fff",
                  color: married === v ? "#fff" : "#666",
                  transition: "all 0.15s",
                }}>{v ? "Married" : "Single"}</button>
            ))}
          </div>
        </div>
        {married && <Slider label="Spouse inc (res.)" min={0} max={200000} step={5000} value={spouseIncRes} onChange={setSpouseIncRes} />}
        {married && <Slider label="Spouse inc (att.)" min={0} max={200000} step={5000} value={spouseIncAtt} onChange={setSpouseIncAtt} />}
        <Slider label="Total loan balance" min={100000} max={1000000} step={10000} value={startBal} onChange={setStartBal} />
        <Slider label="Avg interest rate" min={4} max={10} step={0.1} value={avgRate} onChange={setAvgRate} format={v => v.toFixed(1) + "%"} />
        <Slider label="Prior yr AGI" min={0} max={100000} step={1000} value={priorAGI} onChange={setPriorAGI} />
        <Slider label="PGY-1 base salary" min={55000} max={95000} step={1000} value={pgy1} onChange={setPgy1} />
        <Slider label="Side income" min={0} max={60000} step={1000} value={sideInc} onChange={setSideInc} />
        <Slider label="Residency length" min={3} max={7} step={1} value={resYears} onChange={setResYears} format={v => v + " years"} />

        <div style={{ fontSize: 12, fontWeight: 600, color: "#888", marginTop: 10, marginBottom: 8 }}>Career paths</div>
        <Slider label="PSLF salary" min={200000} max={500000} step={10000} value={pslfSal} onChange={setPslfSal} />
        <Slider label="Private salary" min={300000} max={900000} step={10000} value={privSal} onChange={setPrivSal} />

        <div style={{ fontSize: 12, fontWeight: 600, color: "#888", marginTop: 10, marginBottom: 8 }}>Refinance assumptions</div>
        <Slider label="Refi interest rate" min={3} max={7} step={0.1} value={refiRate} onChange={setRefiRate} format={v => v.toFixed(1) + "%"} />
        <Slider label="Refi payoff term" min={2} max={15} step={1} value={refiYears} onChange={setRefiYears} format={v => v + " years"} />
      </div>

      {/* Ranked strategy cards */}
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>Ranked by 10-year net income (after tax + loans)</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
        {ranked.map((s, i) => {
          const isExp = expanded === s.id;
          const isBest = i === 0;
          return (
            <div key={s.id}>
              <div
                onClick={() => setExpanded(isExp ? null : s.id)}
                style={{
                  background: isBest ? s.bg : "#fff",
                  border: isBest ? `2px solid ${s.border}` : "1px solid #e5e5e5",
                  borderRadius: isExp ? "12px 12px 0 0" : 12,
                  padding: "12px 14px", cursor: "pointer",
                  transition: "all 0.15s",
                  boxShadow: isBest ? `0 2px 8px ${s.border}33` : "0 1px 3px rgba(0,0,0,0.04)",
                }}
              >
                {/* Header row */}
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <div style={{
                    width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                    fontWeight: 700, fontSize: 12, color: "#fff", background: medalColors[i], flexShrink: 0,
                  }}>{medalLabels[i]}</div>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: s.color }}>{s.name}</span>
                    <Badge bg={s.badgeBg} color={s.color}>{s.path} &middot; {s.plan}</Badge>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 10, color: "#888" }}>10yr net income</div>
                    <div style={{ fontSize: 18, fontWeight: 700, fontVariantNumeric: "tabular-nums", color: isBest ? s.color : "#1a1a1a" }}>{fmt(s.tenYrNet)}</div>
                  </div>
                </div>

                {/* Metrics row */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6 }}>
                  {[
                    { label: "Res. payments", value: fmt(s.resTotal) },
                    { label: "Total loan cost", value: fmt(s.totalLoanCost), sub: `#${s.loanRank} cheapest` },
                    { label: s.forgiven > 0 ? "Forgiven (tax-free)" : "Balance at refi", value: s.forgiven > 0 ? fmt(s.forgiven) : fmt(s.balAtRefi), color: s.forgiven > 0 ? "#166534" : s.balAtRefi > startBal ? "#b33b3b" : "#2d7a2d" },
                    { label: s.refiMo > 0 ? "Refi payment" : "Attending payment", value: s.refiMo > 0 ? fmt(s.refiMo)+"/mo" : fmt(s.timeline.find(t=>!t.isRes)?.monthly || 0)+"/mo" },
                    { label: "vs #1 difference", value: i === 0 ? "\u2014" : "-" + fmt(ranked[0].tenYrNet - s.tenYrNet), color: i === 0 ? "#888" : "#b33b3b" },
                  ].map((m, j) => (
                    <div key={j} style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 9, color: "#999", marginBottom: 2 }}>{m.label}</div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: m.color || "#333", fontVariantNumeric: "tabular-nums" }}>{m.value}</div>
                      {m.sub && <div style={{ fontSize: 9, color: "#aaa" }}>{m.sub}</div>}
                    </div>
                  ))}
                </div>

                <div style={{ textAlign: "center", marginTop: 6, fontSize: 10, color: "#aaa" }}>
                  {isExp ? "\u25B2 Click to collapse" : "\u25BC Click for year-by-year breakdown"}
                </div>
              </div>

              {/* Expanded timeline */}
              {isExp && (
                <div style={{ background: "#fff", border: "1px solid #e5e5e5", borderTop: "none", borderRadius: "0 0 12px 12px", padding: 12, overflowX: "auto", boxShadow: "0 2px 4px rgba(0,0,0,0.04)" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11.5 }}>
                    <thead><tr>
                      {["Yr", "Phase", "AGI for pay", "Mo. payment", "Annual", "Interest", "Balance", "Net income"].map(h => (
                        <th key={h} style={{ textAlign: "left", padding: "5px 4px", borderBottom: "2px solid #ddd", fontWeight: 600, color: "#888", fontSize: 10 }}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {s.timeline.map((t, j) => (
                        <tr key={j} style={{ background: t.isRes ? "#FAFAFA" : "transparent" }}>
                          <td style={{ padding: "5px 4px", fontWeight: 600 }}>{t.year}</td>
                          <td style={{ padding: "5px 4px" }}>
                            <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 4, fontWeight: 600, background: t.isRes ? "#E6F1FB" : "#EAF3DE", color: t.isRes ? "#185FA5" : "#3B6D11" }}>
                              {t.isRes ? "PGY-"+t.year : "Attending"}
                            </span>
                          </td>
                          <td style={{ padding: "5px 4px", fontVariantNumeric: "tabular-nums", color: "#888" }}>{fmtK(t.payAGI)}</td>
                          <td style={{ padding: "5px 4px", fontWeight: 600, fontVariantNumeric: "tabular-nums", color: t.monthly === 0 ? "#2d7a2d" : s.color }}>{t.monthly === 0 ? "$0" : fmt(t.monthly)}</td>
                          <td style={{ padding: "5px 4px", fontVariantNumeric: "tabular-nums" }}>{fmt(t.annualPay)}</td>
                          <td style={{ padding: "5px 4px", fontVariantNumeric: "tabular-nums", color: "#b33b3b" }}>{fmt(t.interest)}</td>
                          <td style={{ padding: "5px 4px", fontVariantNumeric: "tabular-nums", fontWeight: 600, color: t.balance > startBal ? "#b33b3b" : "#2d7a2d" }}>{fmt(t.balance)}</td>
                          <td style={{ padding: "5px 4px", fontVariantNumeric: "tabular-nums" }}>{fmt(t.afterTaxAndLoans)}</td>
                        </tr>
                      ))}
                      {s.forgiven > 0 && (
                        <tr style={{ borderTop: "2px solid #22c55e", background: "#F0FDF4" }}>
                          <td colSpan={5} style={{ padding: "6px 4px", fontWeight: 700, color: "#166534", fontSize: 12 }}>Tax-free PSLF forgiveness</td>
                          <td colSpan={1}></td>
                          <td style={{ padding: "6px 4px", fontWeight: 700, color: "#166534" }}>{fmt(s.forgiven)}</td>
                          <td></td>
                        </tr>
                      )}
                      {s.refiMo > 0 && (
                        <tr style={{ borderTop: "2px solid #fbbf24", background: "#FFFBEB" }}>
                          <td colSpan={3} style={{ padding: "6px 4px", fontWeight: 700, color: "#854F0B", fontSize: 12 }}>Refinance: {fmt(s.refiMo)}/mo x {refiYears} yr</td>
                          <td style={{ padding: "6px 4px", fontWeight: 700, color: "#854F0B" }}>{fmt(s.refiMo)}</td>
                          <td style={{ padding: "6px 4px", fontWeight: 700 }}>{fmt(s.refiTotal)}</td>
                          <td colSpan={3}></td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Recommendation callout */}
      <div style={{ background: best.bg, borderRadius: 12, padding: "14px 16px", marginBottom: 16, border: `1px solid ${best.border}` }}>
        <div style={{ fontWeight: 700, color: best.color, fontSize: 14, marginBottom: 6 }}>
          {best.name} gives you the highest 10-year net income: {fmt(best.tenYrNet)}
        </div>
        <div style={{ fontSize: 13, color: "#333", lineHeight: 1.6 }}>
          {best.forgiven > 0
            ? <>With PSLF at a qualifying employer, you pay {fmt(best.totalLoanCost)} total and {fmt(best.forgiven)} is forgiven <strong>tax-free</strong>. No refinancing, no tax bomb.</>
            : <>Going private at {fmt(privSal)}/yr with {refiYears}-year refi means higher income that more than offsets the full loan repayment of {fmt(best.totalLoanCost)}.</>
          }
          {ranked.length > 1 && <> That's {fmt(best.tenYrNet - ranked[1].tenYrNet)} more than the next best option ({ranked[1].name}).</>}
        </div>
      </div>

      {/* Side-by-side comparison table */}
      <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, paddingTop: 8 }}>Side-by-side comparison</div>
      <div style={{ overflowX: "auto", marginBottom: 16, background: "#fff", borderRadius: 12, border: "1px solid #e5e5e5", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", padding: "4px 12px 8px" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr>
            <th style={{ textAlign: "left", padding: "6px 4px", borderBottom: "2px solid #ddd", fontWeight: 600, color: "#888", fontSize: 10 }}>Metric</th>
            {ranked.map(s => (
              <th key={s.id} style={{ textAlign: "center", padding: "6px 4px", borderBottom: "2px solid #ddd", fontWeight: 700, color: s.color, fontSize: 10 }}>
                #{s.rank} {s.name}
              </th>
            ))}
          </tr></thead>
          <tbody>
            {[
              { label: "Career path", fn: s => s.path === "Academic" ? "Academic ("+fmtK(pslfSal)+")" : "Private ("+fmtK(privSal)+")" },
              { label: "IDR plan", fn: s => s.plan },
              { label: "PGY-1 payment", fn: s => s.timeline[0]?.monthly === 0 ? "$0/mo" : fmt(s.timeline[0]?.monthly)+"/mo", good: s => (s.timeline[0]?.monthly || 999) },
              { label: "PGY-2 payment", fn: s => fmt(s.timeline[1]?.monthly || 0)+"/mo", good: s => (s.timeline[1]?.monthly || 999) },
              { label: "Attending payment", fn: s => s.refiMo > 0 ? fmt(s.refiMo)+"/mo (refi)" : fmt(s.timeline.find(t=>!t.isRes)?.monthly || 0)+"/mo" },
              { label: "Paid during residency", fn: s => fmt(s.resTotal), good: s => s.resTotal },
              { label: "Balance at yr "+resYears, fn: s => fmt(s.timeline[resYears-1]?.balance || 0), good: s => (s.timeline[resYears-1]?.balance || 0) },
              { label: "Total loan cost", fn: s => fmt(s.totalLoanCost), good: s => s.totalLoanCost },
              { label: "Forgiven", fn: s => s.forgiven > 0 ? fmt(s.forgiven)+" (tax-free)" : "\u2014" },
              { label: "10yr net income", fn: s => fmt(s.tenYrNet), good: s => -s.tenYrNet },
            ].map((row, i) => {
              const vals = ranked.map(s => ({ val: row.fn(s), score: row.good ? row.good(s) : null }));
              const bestScore = row.good ? Math.min(...vals.map(v => v.score)) : null;
              return (
                <tr key={i} style={{ borderBottom: "0.5px solid #eee" }}>
                  <td style={{ padding: "6px 4px", fontWeight: 600, color: "#888", fontSize: 11 }}>{row.label}</td>
                  {vals.map((v, j) => (
                    <td key={j} style={{
                      padding: "6px 4px", textAlign: "center", fontVariantNumeric: "tabular-nums",
                      fontWeight: bestScore !== null && v.score === bestScore ? 700 : 400,
                      color: bestScore !== null && v.score === bestScore ? "#166534" : "#333",
                      background: bestScore !== null && v.score === bestScore ? "#F0FDF4" : "transparent",
                    }}>{v.val}</td>
                  ))}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{ fontSize: 10, color: "#bbb", lineHeight: 1.5 }}>
        IBR = 10% of (AGI - 150% FPL), prior-year AGI. Married filing jointly uses household AGI and family-size FPL. RAP = 1-10% of total AGI (no $0 payments). PSLF = 120 payments at qualifying employer &#8594; tax-free forgiveness. Tax = 2026 brackets (single or MFJ), standard deduction $15K/$30K. Resident salary increases $2K/yr. 3% attending raises. Refi = fixed amortization. Not financial advice.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
